<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ops IQ</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d0f1a'/%3E%3Crect x='2' y='2' width='28' height='28' rx='7' fill='none' stroke='%234f7cff' stroke-width='1.5'/%3E%3Cpath d='M18 4 L10 17 L15 17 L14 28 L22 15 L17 15 Z' fill='url(%23g)' /%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234f7cff'/%3E%3Cstop offset='100%25' stop-color='%2322d3a5'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f1a;--bg2:#141624;--bg3:#1a1d2e;--bg4:#1f2235;--border:#2a2d45;--border2:#363a5a;--blue:#4f7cff;--blue2:#3d6bef;--indigo:#7c6fcd;--green:#22d3a5;--amber:#f59e0b;--red:#ef4444;--pink:#e879a0;--cyan:#06b6d4;--text:#e8eaf6;--text2:#9ba3c0;--text3:#5c6285}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,#4f7cff,#22d3a5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tsep{flex:1}
.syncpill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);background:var(--bg3);padding:4px 11px;border-radius:20px;border:1px solid var(--border)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sdot.spin{animation:pulse 1s infinite;background:var(--amber)}
.sdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tbtn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .2s}
.tbtn:hover{background:var(--bg3);color:var(--text)}
.tbtn.pri{background:var(--blue);border-color:var(--blue);color:#fff}
.tbtn.pri:hover{background:var(--blue2)}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 20px;flex-shrink:0;overflow-x:auto}
.ni{padding:11px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px}
.ni:hover{color:var(--text2)}
.ni.active{color:var(--blue);border-bottom-color:var(--blue)}
.nbadge{background:var(--blue);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;font-weight:700}
.nbadge.warn{background:var(--amber)}
.main{flex:1;overflow-y:auto;padding:18px 20px}
.mrow{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:14px 16px;position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;opacity:.1}
.mc.blue::after{background:var(--blue)}.mc.green::after{background:var(--green)}.mc.amber::after{background:var(--amber)}.mc.pink::after{background:var(--pink)}.mc.red::after{background:var(--red)}.mc.indigo::after{background:var(--indigo)}.mc.cyan::after{background:var(--cyan)}
.ml{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}
.mv{font-size:26px;font-weight:800;color:var(--text)}
.mc.blue .mv{color:var(--blue)}.mc.green .mv{color:var(--green)}.mc.amber .mv{color:var(--amber)}.mc.pink .mv{color:var(--pink)}.mc.red .mv{color:var(--red)}.mc.indigo .mv{color:var(--indigo)}.mc.cyan .mv{color:var(--cyan)}
.ms{font-size:11px;color:var(--text3);margin-top:3px}
.clickable{cursor:pointer;transition:all .18s}
.clickable:hover{border-color:var(--blue)!important;transform:translateY(-1px)}
.mc.clickable:hover{box-shadow:0 0 0 2px rgba(79,124,255,.4)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:16px}
.cc h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.ccsub{font-size:11px;color:var(--text3);margin-bottom:14px}
.chwrap{position:relative;width:100%}
.tpanel{background:var(--bg3);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.ttoolbar{padding:12px 14px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg4)}
.ttoolbar input[type=text]{padding:6px 11px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;outline:none;width:180px}
.ttoolbar input:focus{border-color:var(--blue)}
.ttoolbar select{padding:6px 9px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;outline:none;max-width:150px}
.tscroll{overflow:auto;max-height:450px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg4);position:sticky;top:0;z-index:5}
th{padding:9px 11px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:8px 11px;border-bottom:1px solid rgba(42,45,69,.4);color:var(--text2);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:rgba(79,124,255,.04);color:var(--text)}
.rn{color:var(--text3);font-size:10px}
.abt{padding:3px 7px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid;background:transparent;opacity:0;transition:opacity .15s}
tr:hover .abt{opacity:1}
.abt.e{color:var(--blue);border-color:rgba(79,124,255,.3)}
.abt.d{color:var(--red);border-color:rgba(239,68,68,.3);margin-left:3px}
.autocell{color:var(--indigo);font-style:italic}
.badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.bg{background:rgba(34,211,165,.12);color:var(--green)}.ba{background:rgba(245,158,11,.12);color:var(--amber)}.br{background:rgba(239,68,68,.12);color:var(--red)}.bb{background:rgba(79,124,255,.12);color:var(--blue)}.bi{background:rgba(124,111,205,.12);color:var(--indigo)}.bgr{background:rgba(92,98,133,.2);color:var(--text3)}
.sbl-list{display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto}
.sbl-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 7px;border-radius:6px;cursor:pointer;transition:background .15s}
.sbl-row:hover{background:rgba(79,124,255,.08)}
.sbl-label{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbl-track{width:65px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;flex-shrink:0}
.sbl-fill{height:100%;border-radius:3px}
.sbl-count{font-weight:700;color:var(--text);min-width:28px;text-align:right;font-size:11px}
.sbl-pct{font-size:10px;color:var(--text3);min-width:30px;text-align:right}
.mstats{display:flex;flex-direction:column;gap:7px}
.mstat{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--bg4);border-radius:7px;border:1px solid var(--border)}
.msl{font-size:12px;color:var(--text2)}.msv{font-size:13px;font-weight:700;color:var(--text)}
.plist{display:flex;flex-direction:column;gap:7px}
.pi{display:flex;flex-direction:column;gap:4px}
.ph{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}
.ph span:last-child{font-weight:700;color:var(--text)}
.pt{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s ease}
.alist{display:flex;flex-direction:column;gap:7px}
.ai{display:flex;gap:10px;padding:9px 12px;border-radius:9px;border:1px solid;align-items:flex-start}
.ai.warn{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2)}.ai.danger{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2)}.ai.ok{background:rgba(34,211,165,.06);border-color:rgba(34,211,165,.2)}
.att{font-size:12px;font-weight:600;color:var(--text)}.ats{font-size:11px;color:var(--text3);margin-top:2px}
.stabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.stab{padding:7px 15px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s}
.stab.active{color:var(--blue);border-bottom-color:var(--blue)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;width:760px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.mhdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.mhdr h2{font-size:15px;font-weight:700;flex:1}
.mclose{background:none;border:1px solid var(--border2);border-radius:7px;width:28px;height:28px;cursor:pointer;color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:var(--bg4);color:var(--text)}
.mbody{padding:20px;overflow-y:auto;flex:1}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{display:flex;flex-direction:column;gap:4px}
.ff.full{grid-column:1/-1}
.ff label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:5px}
.autotag{background:rgba(124,111,205,.2);color:var(--indigo);padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;text-transform:none}
.ff input{padding:8px 10px;background:var(--bg);border:1.5px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border .2s}
.ff input:focus{border-color:var(--blue)}
.ff input[readonly]{background:rgba(124,111,205,.08);color:var(--indigo);cursor:not-allowed}
.ff input::placeholder{color:var(--text3)}
.mftr{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .2s}
.btn-g{background:transparent;border-color:var(--border2);color:var(--text2)}.btn-g:hover{background:var(--bg4)}
.btn-p{background:var(--blue);border-color:var(--blue);color:#fff}.btn-p:hover{background:var(--blue2)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.doverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:400;align-items:flex-end;justify-content:center}
.doverlay.open{display:flex}
.dpanel{background:var(--bg3);border:1px solid var(--border2);border-radius:18px 18px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -20px 60px rgba(0,0,0,.5);animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.dhdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dhdr h2{font-size:15px;font-weight:700;flex:1}
.dclose{background:none;border:1px solid var(--border2);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center}
.dclose:hover{background:var(--bg4);color:var(--text)}
.dbody{padding:18px 22px;overflow-y:auto;flex:1}
.dstats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.dsc{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.dsc .dl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:5px}
.dsc .dv{font-size:20px;font-weight:800;color:var(--blue)}
.dsc .ds{font-size:11px;color:var(--text3);margin-top:2px}
.backbtn{padding:5px 12px;background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:12px;cursor:pointer}
.backbtn:hover{background:var(--bg4)}
.dtscroll{max-height:300px;overflow-y:auto;border-radius:8px;border:1px solid var(--border)}
.dtable{width:100%;border-collapse:collapse;font-size:12px}
.dtable th{padding:8px 10px;background:var(--bg4);font-size:10px;text-transform:uppercase;color:var(--text3);font-weight:700;letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid var(--border);position:sticky;top:0}
.dtable td{padding:7px 10px;border-bottom:1px solid rgba(42,45,69,.4);color:var(--text2);white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.twrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:10px 16px;border-radius:9px;font-size:12px;color:#fff;background:var(--bg4);border:1px solid var(--border2);opacity:0;transform:translateY(8px);transition:all .3s;max-width:320px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:rgba(22,163,74,.9)}.toast.err{background:rgba(185,28,28,.9)}.toast.info{background:rgba(79,124,255,.9)}
.lov{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.lov.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(79,124,255,.2);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{color:var(--text2);font-size:14px;font-weight:600}
.lsub{color:var(--text3);font-size:12px}
/* ── FLIGHTS ── */
.flight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:18px}
.fc{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s}
.fc:hover{border-color:var(--blue);transform:translateY(-2px)}
.fc.overdue{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.04)}
.fc.today{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.04)}
.fc.soon{border-color:rgba(79,124,255,.4);background:rgba(79,124,255,.06)}
.fc-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.fc-mawb{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.fc-sub{font-size:11px;color:var(--text2);margin-bottom:12px}
.fc-countdown{display:flex;gap:8px;margin-bottom:10px}
.fc-unit{text-align:center;background:var(--bg4);border-radius:8px;padding:6px 10px;min-width:44px}
.fc-num{font-size:20px;font-weight:800;color:var(--blue);line-height:1}
.fc.today .fc-num{color:var(--amber)}
.fc.overdue .fc-num{color:var(--red)}
.fc-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;margin-top:2px}
.fc-eta{font-size:11px;color:var(--text2)}
.fc-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
/* ── AMAZON ── */
.amz-filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 14px;background:var(--bg4);border-bottom:1px solid var(--border);border-radius:13px 13px 0 0}
.amz-filter-bar input{padding:6px 11px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;outline:none;width:200px}
.amz-filter-bar input:focus{border-color:var(--blue)}
.amz-filter-bar select{padding:6px 9px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;outline:none}
.amz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:14px}
.amz-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s}
.amz-card:hover{border-color:var(--amber);transform:translateY(-1px)}
.amz-fba{font-size:12px;font-weight:800;color:var(--amber);margin-bottom:4px;font-family:monospace;letter-spacing:.03em}
.amz-facility{font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:8px}
.amz-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(42,45,69,.3)}
.amz-row:last-of-type{border:none}
.amz-key{color:var(--text3)}.amz-val{color:var(--text);font-weight:600;text-align:right;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tat-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:8px}
.tat-fill{height:100%;border-radius:3px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:860px){.g2,.flight-grid,.amz-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="lov" id="lov">
  <div class="spinner"></div>
  <div class="ltxt">⚡ OPS IQ</div>
  <div class="lsub" id="ltxt">Connecting to your Google Sheet...</div>
</div>

<div class="app" id="mainApp" style="display:none">
  <div class="topbar">
    <div class="logo">⚡ OPS IQ</div>
    <span style="font-size:11px;color:var(--text3)" id="sheetLabel">Live · Google Sheet</span>
    <div class="tsep"></div>
    <div class="syncpill"><div class="sdot" id="sdot"></div><span id="stxt">Live</span></div>
    <button class="tbtn" id="syncBtn">↻ Sync</button>
    <button class="tbtn pri" id="topAddBtn">+ Add Entry</button>
  </div>
  <div class="nav">
    <div class="ni active" data-page="dashboard">📊 Dashboard</div>
    <div class="ni" data-page="commercial">🏢 Commercial <span class="nbadge" id="cb">0</span></div>
    <div class="ni" data-page="express">✈ Express <span class="nbadge" id="eb">0</span></div>
    <div class="ni" data-page="analytics">📈 Analytics</div>
    <div class="ni" data-page="flights">🛬 Flights <span class="nbadge" id="fb">0</span></div>
    <div class="ni" data-page="amazon">📦 Amazon <span class="nbadge" id="amzb">0</span></div>
    <div class="ni" data-page="alerts">🔔 Alerts <span class="nbadge warn" id="ab">0</span></div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhdr"><h2 id="mtitle">Add Entry</h2><div class="mclose" id="mcloseBtn">×</div></div>
    <div class="mbody"><div id="formContent"></div></div>
    <div class="mftr"><button class="btn btn-g" id="mcancelBtn">Cancel</button><button class="btn btn-p" id="saveBtn">Save</button></div>
  </div>
</div>

<div class="doverlay" id="doverlay">
  <div class="dpanel">
    <div class="dhdr">
      <button class="backbtn" id="backBtn" style="display:none">← Back</button>
      <h2 id="dtitle"></h2>
      <span style="font-size:11px;color:var(--text3);margin-left:8px" id="dsubtitle"></span>
      <div style="flex:1"></div>
      <div class="dclose" id="dcloseBtn">×</div>
    </div>
    <div class="dbody" id="dbody"></div>
  </div>
</div>
<div class="twrap" id="twrap"></div>

<script>
// ══ CONFIG ══════════════════════════════════════════
var WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyk0cETbIJ123zmROj3bQSWrQuCeus1S0WPaIhca1mFvoLa4PrkNxQMOJ9QN4LyI8HP/exec';
var COMM_SHEET_NAME = 'Commercial';
var EXPR_SHEET_NAME = 'Express';

// ══ STATE ═══════════════════════════════════════════

// ══ DATA ════════════════════════════════════════════
function fetchAll(){
  return Promise.all([fetchSheet('commercial'),fetchSheet('express')])
    .then(function(res){parseSheet(res[0],'commercial');parseSheet(res[1],'express');updateBadges();});
}
function fetchSheet(which){
  var url=cfg.url+'?sheet='+which+'&t='+Date.now();
  return fetch(url,{redirect:'follow'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(txt){var j;try{j=JSON.parse(txt);}catch(e){throw new Error('Bad response from script');}if(!j.ok)throw new Error('Script error');return j.data;});
}
function parseSheet(raw,which){
  if(!raw||!Array.isArray(raw)||raw.length<2)return;
  var headers=raw[0].map(function(h){return(h===null||h===undefined)?'':String(h).trim();}).filter(Boolean);
  if(!headers.length)return;
  var rows=[];
  for(var i=1;i<raw.length;i++){
    var r=raw[i],obj={},has=false;
    headers.forEach(function(h,j){
      var c=r[j],v='';
      if(c===null||c===undefined||c==='')v='';
      else if(typeof c==='object'&&typeof c.getMonth==='function'){var d=c.getDate(),m=c.getMonth()+1,y=c.getFullYear();v=(y<1900)?'':(d<10?'0':'')+d+'/'+(m<10?'0':'')+m+'/'+y;}
      else v=String(c).trim();
      obj[h]=v;if(v)has=true;
    });
    if(has)rows.push(obj);
  }
  if(which==='commercial'){commHeaders=headers;commData=rows;}else{exprHeaders=headers;exprData=rows;}
}
function showApp(){
  document.getElementById('lov').classList.add('hide');
  document.getElementById('mainApp').style.display='flex';
  setSync('ok','Live');
  switchPage('dashboard');
}
function refreshAll(){
  setSync('spin','Syncing...');
  fetchAll().then(function(){renderPage();setSync('ok','Live');toast('Data refreshed','ok');})
    .catch(function(e){setSync('err','Error');toast('Sync failed: '+e.message,'err');});
}
function startTimer(){
  clearInterval(autoTimer);
  autoTimer=setInterval(function(){fetchAll().then(function(){renderPage();setSync('ok','Live');}).catch(function(){setSync('err','Sync error');});},30000);
}
async function writeSheet(action,sheet,row,rowIndex){
  var r=await fetch(cfg.url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,sheet,row,rowIndex})});
  if(!r.ok)throw new Error('HTTP '+r.status);
}

// ══ COLUMN ANALYSER ═════════════════════════════════
function analyseColumns(headers,data){
  return headers.map(function(h){
    var vals=data.map(function(r){return(r[h]||'').trim();}).filter(Boolean);
    var unique=[...new Set(vals)],hl=h.toLowerCase().replace(/[^a-z0-9 ]/g,' ');
    var dateHints=['date','eta','etd','atd','time','handover','flying','arrival','departure','pre alert'];
    var isDate=dateHints.some(function(k){return hl.includes(k);});
    var idHints=['mawb','hawb','awb','flight no','file no','ref','hs code','invoice no','bl no','job no'];
    var isId=idHints.some(function(k){return hl.includes(k);});
    var numHints=['weight','kg','kgs','cbm','qty','quantity','pcs','pieces','packages','pkgs','amount','value','rate','charge','cost','price','fee','total'];
    var isNumName=numHints.some(function(k){return hl.includes(k);});
    var cleanNums=(!isDate&&!isId&&isNumName)?vals.map(function(v){var n=parseFloat(v.replace(/,/g,''));return isNaN(n)?NaN:n;}).filter(function(v){return !isNaN(v);}):[];
    var isNumeric=!isDate&&!isId&&isNumName&&cleanNums.length>vals.length*0.6;
    var numVals=isNumeric?cleanNums:[],isCat=!isDate&&unique.length>=2&&unique.length<=30&&vals.length>0;
    var sum=numVals.length?numVals.reduce(function(a,b){return a+b;},0):null;
    return{h:h,vals:vals,unique:unique,isDate:isDate,isId:isId,isNumeric:isNumeric,isCat:isCat,numVals:numVals,
      total:vals.length,missing:data.length-vals.length,sum:sum,
      avg:numVals.length?sum/numVals.length:null,
      max:numVals.length?Math.max.apply(null,numVals):null,
      min:numVals.length?Math.min.apply(null,numVals):null,
      freq:vals.reduce(function(m,v){m[v]=(m[v]||0)+1;return m;},{})};
  });
}
function topN(freq,n){return Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,n||8);}
function extractArea(addr){if(!addr||!addr.trim())return null;var p=addr.split(',');return p.length>=2?p[1].trim():p[0].trim();}
function mkBarRow(sheet,col,v,c,total,i){var p=Math.round(c/Math.max(total,1)*100);return'<div class="sbl-row" data-drill-val="'+esc(col)+'|||'+esc(v)+'" data-drill-sheet="'+sheet+'"><div class="sbl-label" title="'+esc(v)+'">'+esc(v||'(blank)')+'</div><div class="sbl-track"><div class="sbl-fill" style="width:'+Math.max(p,2)+'%;background:'+PAL[i%PAL.length]+'"></div></div><div class="sbl-count">'+c+'</div><div class="sbl-pct">'+p+'%</div></div>';}

}
function drawBar(id,labels,vals,color){

}

// ══ TABLE ═══════════════════════════════════════════
function renderTable(sheet){
  var isE=sheet==='express',headers=isE?exprHeaders:commHeaders,data=isE?exprData:commData;
  var catCols=headers.filter(function(h){var u=[...new Set(data.map(function(r){return(r[h]||'').trim();}).filter(Boolean))];return u.length>=2&&u.length<=25;}).slice(0,4);
  var selects=catCols.map(function(h){var opts=[...new Set(data.map(function(r){return(r[h]||'').trim();}).filter(Boolean))].sort().map(function(v){return'<option>'+esc(v)+'</option>';}).join('');return'<select class="tfilter" data-col="'+esc(h)+'"><option value="">All '+esc(h)+'</option>'+opts+'</select>';}).join('');
  document.getElementById('mainContent').innerHTML='<div class="tpanel"><div class="ttoolbar"><input type="text" id="tsearch" placeholder="Search...">'+selects+'<button class="tbtn pri" id="tAddBtn" style="padding:5px 12px;font-size:11px">+ Add Row</button><span style="margin-left:auto;font-size:11px;color:var(--text3)" id="tcount">'+data.length+' records</span></div><div class="tscroll"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table><div class="empty" id="tempty" style="display:none;text-align:center;padding:40px;color:var(--text3)">No records match</div></div></div>';
  document.getElementById('tsearch').addEventListener('input',function(){filterTbl(sheet);});
  document.getElementById('tAddBtn').addEventListener('click',function(){openModal(sheet,-1);});
  document.querySelectorAll('.tfilter').forEach(function(s){s.addEventListener('change',function(){filterTbl(sheet);});});
  filterTbl(sheet);
}
function filterTbl(sheet){
  var isE=sheet==='express',headers=isE?exprHeaders:commHeaders,data=isE?exprData:commData;
  var q=(document.getElementById('tsearch').value||'').toLowerCase(),filters={};
  document.querySelectorAll('.tfilter').forEach(function(s){if(s.value)filters[s.dataset.col]=s.value;});
  var statusH=commHeaders.find(function(h){return h.toLowerCase().includes('status');})||'';
  var rows=data.filter(function(r){for(var col in filters){if((r[col]||'')!==filters[col])return false;}if(!q)return true;return headers.some(function(h){return(r[h]||'').toLowerCase().includes(q);});});
  var tc=document.getElementById('tcount');if(tc)tc.textContent=rows.length+' of '+data.length+' records';
  var th=document.getElementById('thead'),tb=document.getElementById('tbody'),em=document.getElementById('tempty');
  if(!tb)return;
  th.innerHTML='<tr><th class="rn">#</th>'+headers.map(function(h){return'<th'+(isE&&EXPR_AUTO.includes(h)?' style="color:#b794f4"':'')+'>'+esc(h)+(isE&&EXPR_AUTO.includes(h)?'★':'')+'</th>';}).join('')+'<th></th></tr>';
  if(!rows.length){tb.innerHTML='';em.style.display='block';return;}em.style.display='none';
  tb.innerHTML=rows.map(function(r){var oi=data.indexOf(r);return'<tr><td class="rn">'+(oi+1)+'</td>'+headers.map(function(h){var v=r[h]||'',isA=isE&&EXPR_AUTO.includes(h),isSt=h===statusH;return'<td class="'+(isA?'autocell':'')+'" title="'+esc(v)+'">'+(isSt?statusBadge(v):esc(v)||'—')+'</td>';}).join('')+'<td><button class="abt e" data-sheet="'+sheet+'" data-idx="'+oi+'">Edit</button><button class="abt d" data-sheet="'+sheet+'" data-idx="'+oi+'">Del</button></td></tr>';}).join('');
  tb.querySelectorAll('.abt.e').forEach(function(b){b.addEventListener('click',function(){openModal(b.dataset.sheet,parseInt(b.dataset.idx));});});
  tb.querySelectorAll('.abt.d').forEach(function(b){b.addEventListener('click',function(){delRow(b.dataset.sheet,parseInt(b.dataset.idx));});});
}
function statusBadge(v){var vl=(v||'').toLowerCase();var cls=vl.includes('clear')||vl.includes('done')||vl.includes('deliver')||vl.includes('complet')?'bg':vl.includes('pend')||vl.includes('process')?'ba':vl.includes('hold')||vl.includes('delay')||vl.includes('cancel')?'br':v?'bb':'bgr';return v?'<span class="badge '+cls+'">'+esc(v)+'</span>':'—';}

function parseDate(str){
  if(!str||str.trim()==='')return null;
  var s=str.trim(),d;
  var m1=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m1)d=new Date(+m1[3],+m1[2]-1,+m1[1]);
  if(!d){var m2=s.match(/^(\d{4})[\/\-](\d{2})[\/\-](\d{2})/);if(m2)d=new Date(+m2[1],+m2[2]-1,+m2[3]);}
  if(!d){try{var t=new Date(s);if(!isNaN(t.getTime()))d=t;}catch(e){}}
  return(d&&!isNaN(d.getTime()))?d:null;
}
function getUpcomingFlights(){
  var today=new Date();today.setHours(0,0,0,0);
  var results=[];
  var findCol=function(headers,hints){return headers.find(function(h){var hl=h.toLowerCase();return hints.some(function(k){return hl.includes(k);});});};
  // Commercial
  var etaC=findCol(commHeaders,['eta','arrival date','expected date']);
  var flightC=findCol(commHeaders,['flight']);
  var mawbC=commHeaders[0]||'';
  var statusC=findCol(commHeaders,['status'])||'';
  var consC=findCol(commHeaders,['consignee'])||'';
  var origC=findCol(commHeaders,['origin','loading'])||'';
  var wtC=findCol(commHeaders,['weight'])||'';
  var pkgC=findCol(commHeaders,['pkg','pcs'])||'';
  if(etaC){
    commData.forEach(function(r){
      var eta=parseDate(r[etaC]||'');if(!eta)return;
      var diff=Math.floor((eta-today)/(1000*60*60*24));
      if(diff>-30&&diff<=60){
        results.push({sheet:'commercial',mawb:r[mawbC]||'—',flight:r[flightC]||'',eta:eta,etaStr:r[etaC]||'',diff:diff,
          status:r[statusC]||'',consignee:r[consC]||'',origin:r[origC]||'',weight:r[wtC]||'',pkgs:r[pkgC]||'',port:'',raw:r});
      }
    });
  }
  // Express
  var etaE=findCol(exprHeaders,['eta','arrival']);
  var flightE=findCol(exprHeaders,['flight'])||'';
  var mawbE=exprHeaders[0]||'';
  var portE=findCol(exprHeaders,['port'])||'';
  var partnerE=findCol(exprHeaders,['partner'])||'';
  var wtE=findCol(exprHeaders,['weight'])||'';
  var pkgE=findCol(exprHeaders,['pkg','pcs'])||'';
  var consE=findCol(exprHeaders,['consignee'])||'';
  if(etaE){
    exprData.forEach(function(r){
      var eta=parseDate(r[etaE]||'');if(!eta)return;
      var diff=Math.floor((eta-today)/(1000*60*60*24));
      if(diff>-30&&diff<=60){
        results.push({sheet:'express',mawb:r[mawbE]||'—',flight:r[flightE]||'',eta:eta,etaStr:r[etaE]||'',diff:diff,
          status:'',consignee:r[consE]||'',origin:'',weight:r[wtE]||'',pkgs:r[pkgE]||'',port:r[portE]||'',raw:r});
      }
    });
  }
  results.sort(function(a,b){return a.diff-b.diff;});
  return results;
}

function getAmazonShipments(){
  var findCol=function(headers,hints){return headers.find(function(h){var hl=h.toLowerCase();return hints.some(function(k){return hl.includes(k);});});};
  var etaC=findCol(commHeaders,['eta','arrival']);
  var etdC=findCol(commHeaders,['etd','departure','fly']);
  var statusC=findCol(commHeaders,['status'])||'';
  var modeC=findCol(commHeaders,['mode'])||'';
  var wtC=findCol(commHeaders,['weight'])||'';
  var pkgC=findCol(commHeaders,['pkg','pcs'])||'';
  var cbmC=findCol(commHeaders,['cbm'])||'';
  var origC=findCol(commHeaders,['origin','loading'])||'';
  var delivC=findCol(commHeaders,['delivery','address'])||'';
  var chbC=findCol(commHeaders,['chb'])||'';
  var cfsC=findCol(commHeaders,['cfs'])||'';
  var mawbC=commHeaders[0]||'';
  var today=new Date();today.setHours(0,0,0,0);

  return commData.filter(function(r){
    var allVals=Object.values(r).join(' ');
    return /FBA[A-Z0-9]{5,}/i.test(allVals)||/amazon/i.test(allVals);
  }).map(function(r){
    var allVals=Object.values(r).join(' ');
    var fbaMatch=allVals.match(/FBA[A-Z0-9]{5,}/i);
    var fbaId=fbaMatch?fbaMatch[0].toUpperCase():'';
    // Facility code: look for 3-4 letter+optional digit pattern near FBA or in delivery
    var facilityCode='';
    if(delivC&&r[delivC]){var dm=r[delivC].match(/\b([A-Z]{3,4}\d?)\b/);if(dm)facilityCode=dm[1];}
    if(!facilityCode&&fbaId){var fm=fbaId.match(/FBA\d{2}([A-Z]{3,4})/i);if(fm)facilityCode=fm[1].toUpperCase();}
    var etdDate=etdC?parseDate(r[etdC]||''):null;
    var etaDate=etaC?parseDate(r[etaC]||''):null;
    var tat=(etdDate&&etaDate)?Math.round((etaDate-etdDate)/(1000*60*60*24)):null;
    var daysInClearance=etaDate?Math.floor((today-etaDate)/(1000*60*60*24)):null;
    return{fbaId:fbaId,facilityCode:facilityCode,mawb:r[mawbC]||'',status:r[statusC]||'',mode:r[modeC]||'',
      origin:r[origC]||'',delivery:r[delivC]||'',weight:r[wtC]||'',pkgs:r[pkgC]||'',cbm:r[cbmC]||'',
      etd:r[etdC]||'',eta:r[etaC]||'',chb:r[chbC]||'',cfs:r[cfsC]||'',tat:tat,daysInClearance:daysInClearance,raw:r};
  });
}

    '<select id="amzFacF"><option value="">All Facilities</option>'+facilities.sort().map(function(f){return'<option>'+esc(f)+'</option>';}).join('')+'</select>'+

  '</div>';

  html+='<div class="amz-grid" id="amzGrid">';

    var tatPct=s.tat?Math.min(s.tat/30*100,100):0;
    var stCls=s.status.toLowerCase().includes('clear')||s.status.toLowerCase().includes('deliver')?'bg':s.status.toLowerCase().includes('pend')?'ba':s.status.toLowerCase().includes('hold')?'br':'bb';
    html+='<div class="amz-card" data-aidx="'+idx+'" onclick="openAmzDrill('+idx+')">'+

      (s.facilityCode?'<div class="amz-facility">📍 FC: '+esc(s.facilityCode)+'</div>':'')+
      (s.status?'<div style="margin-bottom:8px"><span class="badge '+stCls+'">'+esc(s.status)+'</span></div>':'')+
      '<div class="amz-row"><span class="amz-key">MAWB</span><span class="amz-val" style="font-family:monospace;font-size:10px">'+esc(s.mawb)+'</span></div>'+
      (s.origin?'<div class="amz-row"><span class="amz-key">Origin</span><span class="amz-val">'+esc(s.origin)+'</span></div>':'')+
      (s.mode?'<div class="amz-row"><span class="amz-key">Mode</span><span class="amz-val">'+esc(s.mode)+'</span></div>':'')+
      (s.weight?'<div class="amz-row"><span class="amz-key">Weight</span><span class="amz-val">'+esc(s.weight)+'</span></div>':'')+
      (s.pkgs?'<div class="amz-row"><span class="amz-key">Packages</span><span class="amz-val">'+esc(s.pkgs)+'</span></div>':'')+
      (s.cbm?'<div class="amz-row"><span class="amz-key">CBM</span><span class="amz-val">'+esc(s.cbm)+'</span></div>':'')+
      (s.eta?'<div class="amz-row"><span class="amz-key">ETA</span><span class="amz-val">'+esc(s.eta)+'</span></div>':'')+
      (s.chb?'<div class="amz-row"><span class="amz-key">CHB</span><span class="amz-val">'+esc(s.chb)+'</span></div>':'')+
      (s.cfs?'<div class="amz-row"><span class="amz-key">CFS</span><span class="amz-val">'+esc(s.cfs)+'</span></div>':'')+
      (s.delivery?'<div class="amz-row"><span class="amz-key">Delivery</span><span class="amz-val">'+esc(s.delivery)+'</span></div>':'')+
      (s.tat!=null?'<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:3px"><span>TAT</span><span class="badge '+tatColor+'">'+s.tat+'d</span></div><div class="tat-bar"><div class="tat-fill" style="width:'+tatPct+'%;background:'+tatFill+'"></div></div></div>':'')+
      (s.daysInClearance!=null&&s.daysInClearance>0?'<div style="font-size:10px;color:var(--red);margin-top:6px">⏳ '+s.daysInClearance+'d since arrival</div>':'')+
    '</div>';
  });
  html+='</div>';
  mc.innerHTML=html;

  var se=document.getElementById('amzSearch'),ste=document.getElementById('amzStatusF'),fe=document.getElementById('amzFacF');
  function applyAmz(){
    var q=(se.value||'').toLowerCase(),sv=ste.value,fv=fe.value,vis=0;
    document.querySelectorAll('.amz-card[data-aidx]').forEach(function(card){
      var s=shipments[parseInt(card.dataset.aidx)];
      var show=(!q||(s.fbaId+s.mawb+s.facilityCode).toLowerCase().includes(q))&&(!sv||s.status===sv)&&(!fv||s.facilityCode===fv);
      card.style.display=show?'':'none';if(show)vis++;
    });
    var cnt=document.getElementById('amzCount');if(cnt)cnt.textContent=vis+' shipments';
  }
  if(se)se.addEventListener('input',applyAmz);
  if(ste)ste.addEventListener('change',applyAmz);
  if(fe)fe.addEventListener('change',applyAmz);
}
