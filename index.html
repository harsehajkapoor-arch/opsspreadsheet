<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ops IQ</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d0f1a'/%3E%3Crect x='2' y='2' width='28' height='28' rx='7' fill='none' stroke='%234f7cff' stroke-width='1.5'/%3E%3Cpath d='M18 4 L10 17 L15 17 L14 28 L22 15 L17 15 Z' fill='url(%23g)' /%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234f7cff'/%3E%3Cstop offset='100%25' stop-color='%2322d3a5'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f1a;--bg2:#141624;--bg3:#1a1d2e;--bg4:#1f2235;--border:#2a2d45;--border2:#363a5a;--blue:#4f7cff;--blue2:#3d6bef;--indigo:#7c6fcd;--green:#22d3a5;--amber:#f59e0b;--red:#ef4444;--pink:#e879a0;--cyan:#06b6d4;--text:#e8eaf6;--text2:#9ba3c0;--text3:#5c6285}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,#4f7cff,#22d3a5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tsep{flex:1}
.syncpill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);background:var(--bg3);padding:4px 11px;border-radius:20px;border:1px solid var(--border)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sdot.spin{animation:pulse 1s infinite;background:var(--amber)}
.sdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tbtn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .2s}
.tbtn:hover{background:var(--bg3);color:var(--text)}
.tbtn.pri{background:var(--blue);border-color:var(--blue);color:#fff}
.tbtn.pri:hover{background:var(--blue2)}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 20px;flex-shrink:0;overflow-x:auto}
.ni{padding:11px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px}
.ni:hover{color:var(--text2)}
.ni.active{color:var(--blue);border-bottom-color:var(--blue)}
.nbadge{background:var(--blue);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;font-weight:700}
.nbadge.warn{background:var(--amber)}
.main{flex:1;overflow-y:auto;padding:18px 20px}
.mrow{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:14px 16px;position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;opacity:.1}
.mc.blue::after{background:var(--blue)}.mc.green::after{background:var(--green)}.mc.amber::after{background:var(--amber)}.mc.pink::after{background:var(--pink)}.mc.red::after{background:var(--red)}.mc.indigo::after{background:var(--indigo)}.mc.cyan::after{background:var(--cyan)}
.ml{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}
.mv{font-size:26px;font-weight:800;color:var(--text)}
.mc.blue .mv{color:var(--blue)}.mc.green .mv{color:var(--green)}.mc.amber .mv{color:var(--amber)}.mc.pink .mv{color:var(--pink)}.mc.red .mv{color:var(--red)}.mc.indigo .mv{color:var(--indigo)}.mc.cyan .mv{color:var(--cyan)}
.ms{font-size:11px;color:var(--text3);margin-top:3px}
.clickable{cursor:pointer;transition:all .18s}
.clickable:hover{border-color:var(--blue)!important;transform:translateY(-1px)}
.mc.clickable:hover{box-shadow:0 0 0 2px rgba(79,124,255,.4)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:16px}
.cc h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.ccsub{font-size:11px;color:var(--text3);margin-bottom:14px}
.chwrap{position:relative;width:100%}
.tpanel{background:var(--bg3);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.ttoolbar{padding:12px 14px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg4)}
.ttoolbar input[type=text]{padding:6px 11px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;outline:none;width:180px}
.ttoolbar input:focus{border-color:var(--blue)}
.ttoolbar select{padding:6px 9px;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;outline:none;max-width:150px}
.tscroll{overflow:auto;max-height:450px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg4);position:sticky;top:0;z-index:5}
th{padding:9px 11px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:8px 11px;border-bottom:1px solid rgba(42,45,69,.4);color:var(--text2);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:rgba(79,124,255,.04);color:var(--text)}
.rn{color:var(--text3);font-size:10px}
.abt{padding:3px 7px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid;background:transparent;opacity:0;transition:opacity .15s}
tr:hover .abt{opacity:1}
.abt.e{color:var(--blue);border-color:rgba(79,124,255,.3)}
.abt.d{color:var(--red);border-color:rgba(239,68,68,.3);margin-left:3px}
.autocell{color:var(--indigo);font-style:italic}
.badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.bg{background:rgba(34,211,165,.12);color:var(--green)}.ba{background:rgba(245,158,11,.12);color:var(--amber)}.br{background:rgba(239,68,68,.12);color:var(--red)}.bb{background:rgba(79,124,255,.12);color:var(--blue)}.bi{background:rgba(124,111,205,.12);color:var(--indigo)}.bgr{background:rgba(92,98,133,.2);color:var(--text3)}
.sbl-list{display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto}
.sbl-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 7px;border-radius:6px;cursor:pointer;transition:background .15s}
.sbl-row:hover{background:rgba(79,124,255,.08)}
.sbl-label{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbl-track{width:65px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;flex-shrink:0}
.sbl-fill{height:100%;border-radius:3px}
.sbl-count{font-weight:700;color:var(--text);min-width:28px;text-align:right;font-size:11px}
.sbl-pct{font-size:10px;color:var(--text3);min-width:30px;text-align:right}
.mstats{display:flex;flex-direction:column;gap:7px}
.mstat{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--bg4);border-radius:7px;border:1px solid var(--border)}
.msl{font-size:12px;color:var(--text2)}.msv{font-size:13px;font-weight:700;color:var(--text)}
.plist{display:flex;flex-direction:column;gap:7px}
.pi{display:flex;flex-direction:column;gap:4px}
.ph{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}
.ph span:last-child{font-weight:700;color:var(--text)}
.pt{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s ease}
.alist{display:flex;flex-direction:column;gap:7px}
.ai{display:flex;gap:10px;padding:9px 12px;border-radius:9px;border:1px solid;align-items:flex-start}
.ai.warn{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2)}.ai.danger{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2)}.ai.ok{background:rgba(34,211,165,.06);border-color:rgba(34,211,165,.2)}
.att{font-size:12px;font-weight:600;color:var(--text)}.ats{font-size:11px;color:var(--text3);margin-top:2px}
.stabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.stab{padding:7px 15px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s}
.stab.active{color:var(--blue);border-bottom-color:var(--blue)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;width:760px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.mhdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.mhdr h2{font-size:15px;font-weight:700;flex:1}
.mclose{background:none;border:1px solid var(--border2);border-radius:7px;width:28px;height:28px;cursor:pointer;color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:var(--bg4);color:var(--text)}
.mbody{padding:20px;overflow-y:auto;flex:1}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{display:flex;flex-direction:column;gap:4px}
.ff.full{grid-column:1/-1}
.ff label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:5px}
.autotag{background:rgba(124,111,205,.2);color:var(--indigo);padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;text-transform:none}
.ff input{padding:8px 10px;background:var(--bg);border:1.5px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border .2s}
.ff input:focus{border-color:var(--blue)}
.ff input[readonly]{background:rgba(124,111,205,.08);color:var(--indigo);cursor:not-allowed}
.ff input::placeholder{color:var(--text3)}
.mftr{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .2s}
.btn-g{background:transparent;border-color:var(--border2);color:var(--text2)}.btn-g:hover{background:var(--bg4)}
.btn-p{background:var(--blue);border-color:var(--blue);color:#fff}.btn-p:hover{background:var(--blue2)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.doverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:400;align-items:flex-end;justify-content:center}
.doverlay.open{display:flex}
.dpanel{background:var(--bg3);border:1px solid var(--border2);border-radius:18px 18px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -20px 60px rgba(0,0,0,.5);animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.dhdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dhdr h2{font-size:15px;font-weight:700;flex:1}
.dclose{background:none;border:1px solid var(--border2);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center}
.dclose:hover{background:var(--bg4);color:var(--text)}
.dbody{padding:18px 22px;overflow-y:auto;flex:1}
.dstats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.dsc{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.dsc .dl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:5px}
.dsc .dv{font-size:20px;font-weight:800;color:var(--blue)}
.dsc .ds{font-size:11px;color:var(--text3);margin-top:2px}
.backbtn{padding:5px 12px;background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:12px;cursor:pointer}
.backbtn:hover{background:var(--bg4)}
.dtscroll{max-height:300px;overflow-y:auto;border-radius:8px;border:1px solid var(--border)}
.dtable{width:100%;border-collapse:collapse;font-size:12px}
.dtable th{padding:8px 10px;background:var(--bg4);font-size:10px;text-transform:uppercase;color:var(--text3);font-weight:700;letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid var(--border);position:sticky;top:0}
.dtable td{padding:7px 10px;border-bottom:1px solid rgba(42,45,69,.4);color:var(--text2);white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.twrap{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:10px 16px;border-radius:9px;font-size:12px;color:#fff;background:var(--bg4);border:1px solid var(--border2);opacity:0;transform:translateY(8px);transition:all .3s;max-width:320px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:rgba(22,163,74,.9)}.toast.err{background:rgba(185,28,28,.9)}.toast.info{background:rgba(79,124,255,.9)}
.lov{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.lov.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(79,124,255,.2);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{color:var(--text2);font-size:14px;font-weight:600}
.lsub{color:var(--text3);font-size:12px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:860px){.g2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="lov" id="lov">
  <div class="spinner"></div>
  <div class="ltxt">⚡ OPS IQ</div>
  <div class="lsub" id="ltxt">Connecting to your Google Sheet...</div>
</div>

<!-- APP -->
<div class="app" id="mainApp" style="display:none">
  <div class="topbar">
    <div class="logo">⚡ OPS IQ</div>
    <span style="font-size:11px;color:var(--text3)" id="sheetLabel">Live · Google Sheet</span>
    <div class="tsep"></div>
    <div class="syncpill"><div class="sdot" id="sdot"></div><span id="stxt">Live</span></div>
    <button class="tbtn" id="syncBtn">↻ Sync</button>
    <button class="tbtn pri" id="topAddBtn">+ Add Entry</button>
  </div>
  <div class="nav">
    <div class="ni active" data-page="dashboard">📊 Dashboard</div>
    <div class="ni" data-page="commercial">🏢 Commercial <span class="nbadge" id="cb">0</span></div>
    <div class="ni" data-page="express">✈ Express <span class="nbadge" id="eb">0</span></div>
    <div class="ni" data-page="analytics">📈 Analytics</div>
    <div class="ni" data-page="alerts">🔔 Alerts <span class="nbadge warn" id="ab">0</span></div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhdr"><h2 id="mtitle">Add Entry</h2><div class="mclose" id="mcloseBtn">×</div></div>
    <div class="mbody"><div id="formContent"></div></div>
    <div class="mftr"><button class="btn btn-g" id="mcancelBtn">Cancel</button><button class="btn btn-p" id="saveBtn">Save</button></div>
  </div>
</div>

<!-- DRILL DOWN -->
<div class="doverlay" id="doverlay">
  <div class="dpanel">
    <div class="dhdr">
      <button class="backbtn" id="backBtn" style="display:none">← Back</button>
      <h2 id="dtitle"></h2>
      <span style="font-size:11px;color:var(--text3);margin-left:8px" id="dsubtitle"></span>
      <div style="flex:1"></div>
      <div class="dclose" id="dcloseBtn">×</div>
    </div>
    <div class="dbody" id="dbody"></div>
  </div>
</div>
<div class="twrap" id="twrap"></div>

<script>
// ══ HARDCODED CONFIG — edit only these 3 lines if your URL changes ══
var WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyk0cETbIJ123zmROj3bQSWrQuCeus1S0WPaIhca1mFvoLa4PrkNxQMOJ9QN4LyI8HP/exec';
var COMM_SHEET_NAME = 'Commercial';
var EXPR_SHEET_NAME = 'Express';
// ══════════════════════════════════════════════════════════════════════

var cfg = {url: WEB_APP_URL, commSheet: COMM_SHEET_NAME, exprSheet: EXPR_SHEET_NAME, isDemo: false};
var commData=[], exprData=[], commHeaders=[], exprHeaders=[];
var modalState={sheet:'',rowIdx:-1}, drillStack=[], charts={}, currentPage='dashboard', autoTimer=null;
var EXPR_AUTO=['FLIGHT No.','OC Clearance Partner','Number Of Pkgs','HANDOVER DATE','Expected FLYING DATE','Port','ETD (Local airport time)','ATD (Local airport time)','ETA (Local airport time)'];
var PAL=['#4f7cff','#22d3a5','#f59e0b','#ef4444','#e879a0','#7c6fcd','#06b6d4','#84cc16','#f97316','#a855f7','#14b8a6','#eab308'];

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('syncBtn').addEventListener('click', refreshAll);
  document.getElementById('topAddBtn').addEventListener('click', function(){ openModal(currentPage==='express'?'express':'commercial',-1); });
  document.getElementById('saveBtn').addEventListener('click', saveEntry);
  document.getElementById('mcancelBtn').addEventListener('click', closeModal);
  document.getElementById('mcloseBtn').addEventListener('click', closeModal);
  document.getElementById('dcloseBtn').addEventListener('click', closeDrill);
  document.getElementById('backBtn').addEventListener('click', drillBack);
  document.getElementById('doverlay').addEventListener('click', function(e){ if(e.target===this) closeDrill(); });
  document.querySelectorAll('.ni').forEach(function(el){ el.addEventListener('click', function(){ switchPage(this.dataset.page); }); });

  // AUTO-CONNECT immediately — no setup screen
  document.getElementById('ltxt').textContent = 'Fetching your data...';
  fetchAll()
    .then(function(){ showApp(); startTimer(); })
    .catch(function(e){ document.getElementById('ltxt').textContent = 'Error: ' + e.message + ' — Please refresh the page.'; });
});

function fetchAll(){
  return Promise.all([fetchSheet('commercial'), fetchSheet('express')])
    .then(function(res){ parseSheet(res[0],'commercial'); parseSheet(res[1],'express'); updateBadges(); });
}

function fetchSheet(which){
  var url = cfg.url + '?sheet=' + which + '&t=' + Date.now();
  return fetch(url, {redirect:'follow'})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(function(txt){
      var j; try{ j=JSON.parse(txt); }catch(e){ throw new Error('Bad response from script'); }
      if(!j.ok) throw new Error('Script error');
      return j.data;
    });
}

function parseSheet(raw, which){
  if(!raw||!Array.isArray(raw)||raw.length<2) return;
  var headers=raw[0].map(function(h){ return (h===null||h===undefined)?'':String(h).trim(); }).filter(Boolean);
  if(!headers.length) return;
  var rows=[];
  for(var i=1;i<raw.length;i++){
    var r=raw[i],obj={},has=false;
    headers.forEach(function(h,j){
      var c=r[j],v='';
      if(c===null||c===undefined||c==='') v='';
      else if(typeof c==='object'&&typeof c.getMonth==='function'){ var d=c.getDate(),m=c.getMonth()+1,y=c.getFullYear(); v=(y<1900)?'':(d<10?'0':'')+d+'/'+(m<10?'0':'')+m+'/'+y; }
      else v=String(c).trim();
      obj[h]=v; if(v) has=true;
    });
    if(has) rows.push(obj);
  }
  if(which==='commercial'){commHeaders=headers;commData=rows;}else{exprHeaders=headers;exprData=rows;}
}

function showApp(){
  document.getElementById('lov').classList.add('hide');
  document.getElementById('mainApp').style.display='flex';
  setSync('ok','Live');
  switchPage('dashboard');
}

function refreshAll(){
  if(cfg.isDemo){renderPage();return;}
  setSync('spin','Syncing...');
  fetchAll().then(function(){ renderPage(); setSync('ok','Live'); toast('Data refreshed','ok'); })
    .catch(function(e){ setSync('err','Error'); toast('Sync failed: '+e.message,'err'); });
}

function startTimer(){
  clearInterval(autoTimer);
  autoTimer=setInterval(function(){ fetchAll().then(function(){ renderPage(); setSync('ok','Live'); }).catch(function(){ setSync('err','Sync error'); }); }, 30000);
}

async function writeSheet(action, sheet, row, rowIndex){
  var r=await fetch(cfg.url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,sheet,row,rowIndex})});
  if(!r.ok) throw new Error('HTTP '+r.status);
}

function setSync(s,t){ var d=document.getElementById('sdot'); d.className='sdot'+(s==='spin'?' spin':s==='err'?' err':''); document.getElementById('stxt').textContent=t; }
function updateBadges(){ document.getElementById('cb').textContent=commData.length; document.getElementById('eb').textContent=exprData.length; var ac=getAlerts().filter(function(a){return a.type!=='ok';}).length; document.getElementById('ab').textContent=ac||'✓'; }
function switchPage(name){ currentPage=name; document.querySelectorAll('.ni').forEach(function(el){ el.classList.toggle('active',el.dataset.page===name); }); renderPage(); }
function renderPage(){ if(currentPage==='dashboard') renderDash(); else if(currentPage==='commercial') renderTable('commercial'); else if(currentPage==='express') renderTable('express'); else if(currentPage==='analytics') renderAnalytics(); else renderAlerts(); }

function analyseColumns(headers,data){
  return headers.map(function(h){
    var vals=data.map(function(r){return (r[h]||'').trim();}).filter(Boolean);
    var unique=[...new Set(vals)],hl=h.toLowerCase().replace(/[^a-z0-9 ]/g,' ');
    var dateHints=['date','eta','etd','atd','time','handover','flying','arrival','departure','pre alert'];
    var isDate=dateHints.some(function(k){return hl.includes(k);});
    var idHints=['mawb','hawb','awb','flight no','file no','ref','hs code','invoice no','bl no','job no'];
    var isId=idHints.some(function(k){return hl.includes(k);});
    var numHints=['weight','kg','kgs','cbm','qty','quantity','pcs','pieces','packages','pkgs','amount','value','rate','charge','cost','price','fee','total'];
    var isNumName=numHints.some(function(k){return hl.includes(k);});
    var cleanNums=(!isDate&&!isId&&isNumName)?vals.map(function(v){var n=parseFloat(v.replace(/,/g,''));return isNaN(n)?NaN:n;}).filter(function(v){return !isNaN(v);}):[];
    var isNumeric=!isDate&&!isId&&isNumName&&cleanNums.length>vals.length*0.6;
    var numVals=isNumeric?cleanNums:[],isCat=!isDate&&unique.length>=2&&unique.length<=30&&vals.length>0;
    var sum=numVals.length?numVals.reduce(function(a,b){return a+b;},0):null;
    return{h,vals,unique,isDate,isId,isNumeric,isCat,numVals,total:vals.length,missing:data.length-vals.length,sum,
      avg:numVals.length?sum/numVals.length:null,max:numVals.length?Math.max(...numVals):null,min:numVals.length?Math.min(...numVals):null,
      freq:vals.reduce(function(m,v){m[v]=(m[v]||0)+1;return m;},{})};
  });
}
function topN(freq,n){return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,n||8);}
function extractArea(addr){if(!addr||!addr.trim())return null;var p=addr.split(',');return p.length>=2?p[1].trim():p[0].trim();}
function mkBarRow(sheet,col,v,c,total,i){var p=Math.round(c/Math.max(total,1)*100);return`<div class="sbl-row" data-drill-val="${esc(col)}|||${esc(v)}" data-drill-sheet="${sheet}"><div class="sbl-label" title="${esc(v)}">${esc(v||'(blank)')}</div><div class="sbl-track"><div class="sbl-fill" style="width:${Math.max(p,2)}%;background:${PAL[i%PAL.length]}"></div></div><div class="sbl-count">${c}</div><div class="sbl-pct">${p}%</div></div>`;}

function drawDoughnut(id,labels,vals){
  var ctx=document.getElementById(id);if(!ctx)return;
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:PAL.slice(0,labels.length),borderColor:'#1a1d2e',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#9ba3c0',font:{size:10},boxWidth:10,padding:8}}}}});
}
function drawBar(id,labels,vals,color){
  var ctx=document.getElementById(id);if(!ctx)return;
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:(color||'#4f7cff')+'b3',borderColor:color||'#4f7cff',borderWidth:1,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#5c6285',font:{size:10},maxRotation:30},grid:{color:'rgba(42,45,69,.4)'}},y:{ticks:{color:'#5c6285',font:{size:10}},grid:{color:'rgba(42,45,69,.4)'}}}}});
}

    ${totalPkgs?`<div class="mc amber clickable" data-drill-num="${pkgCol?esc(pkgCol.h):''}" data-drill-sheet="express"><div class="ml">Total Packages</div><div class="mv">${totalPkgs.toLocaleString()}</div><div class="ms">Click to analyse ↗</div></div>`:''}
    ${pendCount&&statusCol?`<div class="mc red clickable" data-drill-val="${esc(statusCol.h)}|||Pending" data-drill-sheet="commercial"><div class="ml">Pending</div><div class="mv">${pendCount}</div><div class="ms">Click to see records ↗</div></div>`:''}
    <div class="mc ${ac>0?'amber':'green'}"><div class="ml">Alerts</div><div class="mv">${ac||'✓'}</div><div class="ms">${ac?'Need attention':'All clear'}</div></div>
    <div class="mc indigo"><div class="ml">Total Records</div><div class="mv">${commData.length+exprData.length}</div><div class="ms">Both sheets</div></div>
  </div>
  <div class="g2">
    ${statusCol?`<div class="cc clickable" data-drill-col="${esc(statusCol.h)}" data-drill-sheet="commercial"><h3>Commercial — ${esc(statusCol.h)}</h3><div class="ccsub">Click to explore ↗</div><div class="chwrap" style="height:200px"><canvas id="dsc"></canvas></div></div>`:''}
    ${portCol?`<div class="cc clickable" data-drill-col="${esc(portCol.h)}" data-drill-sheet="express"><h3>Express — ${esc(portCol.h)}</h3><div class="ccsub">Click to explore ↗</div><div class="chwrap" style="height:200px"><canvas id="dpc"></canvas></div></div>`:''}

      <div class="sbl-list">${addrAreas.slice(0,7).map((kv,i)=>mkBarRow('commercial',addrCol.h,kv[0],kv[1],commData.length,i)).join('')}</div>
    </div>
    <div class="cc"><h3>📍 Delivery Address Stats</h3><div class="ccsub">Coverage overview</div>
      <div class="mstats">
        <div class="mstat"><span class="msl">With Address</span><span class="msv" style="color:var(--green)">${addrCol.total}</span></div>
        <div class="mstat"><span class="msl">Missing</span><span class="msv" style="color:${addrCol.missing>0?'var(--red)':'var(--green)'}">${addrCol.missing}</span></div>

function renderTable(sheet){
  var isE=sheet==='express',headers=isE?exprHeaders:commHeaders,data=isE?exprData:commData;
  var catCols=headers.filter(h=>{var u=[...new Set(data.map(r=>(r[h]||'').trim()).filter(Boolean))];return u.length>=2&&u.length<=25;}).slice(0,4);
  var selects=catCols.map(h=>{var opts=[...new Set(data.map(r=>(r[h]||'').trim()).filter(Boolean))].sort().map(v=>`<option>${esc(v)}</option>`).join('');return`<select class="tfilter" data-col="${esc(h)}"><option value="">All ${esc(h)}</option>${opts}</select>`;}).join('');
  document.getElementById('mainContent').innerHTML=`<div class="tpanel"><div class="ttoolbar"><input type="text" id="tsearch" placeholder="Search...">${selects}<button class="tbtn pri" id="tAddBtn" style="padding:5px 12px;font-size:11px">+ Add Row</button><span style="margin-left:auto;font-size:11px;color:var(--text3)" id="tcount">${data.length} records</span></div><div class="tscroll"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table><div class="empty" id="tempty" style="display:none;text-align:center;padding:40px;color:var(--text3)">No records match</div></div></div>`;
  document.getElementById('tsearch').addEventListener('input',()=>filterTbl(sheet));
  document.getElementById('tAddBtn').addEventListener('click',()=>openModal(sheet,-1));
  document.querySelectorAll('.tfilter').forEach(s=>s.addEventListener('change',()=>filterTbl(sheet)));
  filterTbl(sheet);
}

function filterTbl(sheet){
  var isE=sheet==='express',headers=isE?exprHeaders:commHeaders,data=isE?exprData:commData;
  var q=(document.getElementById('tsearch').value||'').toLowerCase(),filters={};
  document.querySelectorAll('.tfilter').forEach(s=>{if(s.value)filters[s.dataset.col]=s.value;});
  var statusH=commHeaders.find(h=>h.toLowerCase().includes('status'))||'';
  var rows=data.filter(r=>{for(var col in filters){if((r[col]||'')!==filters[col])return false;}if(!q)return true;return headers.some(h=>(r[h]||'').toLowerCase().includes(q));});
  var tc=document.getElementById('tcount');if(tc)tc.textContent=rows.length+' of '+data.length+' records';
  var th=document.getElementById('thead'),tb=document.getElementById('tbody'),em=document.getElementById('tempty');
  if(!tb)return;
  th.innerHTML=`<tr><th class="rn">#</th>${headers.map(h=>`<th${isE&&EXPR_AUTO.includes(h)?' style="color:#b794f4"':''}>${h}${isE&&EXPR_AUTO.includes(h)?'★':''}</th>`).join('')}<th></th></tr>`;
  if(!rows.length){tb.innerHTML='';em.style.display='block';return;}em.style.display='none';
  tb.innerHTML=rows.map(r=>{var oi=data.indexOf(r);return`<tr><td class="rn">${oi+1}</td>${headers.map(h=>{var v=r[h]||'',isA=isE&&EXPR_AUTO.includes(h),isSt=h===statusH;return`<td class="${isA?'autocell':''}" title="${esc(v)}">${isSt?statusBadge(v):esc(v)||'—'}</td>`;}).join('')}<td><button class="abt e" data-sheet="${sheet}" data-idx="${oi}">Edit</button><button class="abt d" data-sheet="${sheet}" data-idx="${oi}">Del</button></td></tr>`;}).join('');
  tb.querySelectorAll('.abt.e').forEach(b=>b.addEventListener('click',()=>openModal(b.dataset.sheet,parseInt(b.dataset.idx))));
  tb.querySelectorAll('.abt.d').forEach(b=>b.addEventListener('click',()=>delRow(b.dataset.sheet,parseInt(b.dataset.idx))));
}
function statusBadge(v){var vl=(v||'').toLowerCase();var cls=vl.includes('clear')||vl.includes('done')||vl.includes('deliver')||vl.includes('complet')?'bg':vl.includes('pend')||vl.includes('process')?'ba':vl.includes('hold')||vl.includes('delay')||vl.includes('cancel')?'br':v?'bb':'bgr';return v?`<span class="badge ${cls}">${esc(v)}</span>`:'—';}

function renderAnalytics(){
  document.getElementById('mainContent').innerHTML='<div class="stabs"><div class="stab active" data-atab="comm">🏢 Commercial Analysis</div><div class="stab" data-atab="expr">✈ Express Analysis</div><div class="stab" data-atab="cross">🔗 Cross-Sheet</div></div><div id="aContent"></div>';
  document.querySelectorAll('.stab').forEach(el=>el.addEventListener('click',function(){document.querySelectorAll('.stab').forEach(s=>s.classList.remove('active'));this.classList.add('active');if(this.dataset.atab==='comm')renderCommA();else if(this.dataset.atab==='expr')renderExprA();else renderCrossA();}));
  renderCommA();
}
function renderCommA(){
  var el=document.getElementById('aContent');if(!commData.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">No data</div>';return;}
  var ca=analyseColumns(commHeaders,commData);

  var numCols=ca.filter(c=>c.isNumeric&&c.sum!=null).slice(0,4);
  var addrCol=ca.find(c=>c.h.toLowerCase().includes('delivery')||c.h.toLowerCase().includes('address'));
  var addrAreaMap={};if(addrCol)commData.forEach(r=>{var z=extractArea(r[addrCol.h]||'');if(z)addrAreaMap[z]=(addrAreaMap[z]||0)+1;});
  var addrAreas=Object.entries(addrAreaMap).sort((a,b)=>b[1]-a[1]);

  var addrSection='';
  if(addrCol&&addrAreas.length){addrSection=`<div class="g2" style="margin-bottom:14px"><div class="cc clickable" data-drill-col="${esc(addrCol.h)}" data-drill-sheet="commercial"><h3>📍 ${esc(addrCol.h)}</h3><div class="ccsub">${addrAreas.length} zones · click to drill ↗</div><div class="sbl-list">${addrAreas.slice(0,8).map((kv,i)=>mkBarRow('commercial',addrCol.h,kv[0],kv[1],commData.length,i)).join('')}</div></div><div class="cc"><h3>📍 Zone Chart</h3><div class="ccsub">Distribution</div><div class="chwrap" style="height:200px"><canvas id="addrChart"></canvas></div></div></div>`;}
  var chartRows='';
  for(var i=0;i<catCols.length;i+=2){var c1=catCols[i],c2=catCols[i+1];chartRows+=`<div class="g2" style="margin-bottom:14px">${buildCatCard(c1,'commercial',i)}${c2?buildCatCard(c2,'commercial',i+1):''}</div>`;}
  var complete=`<div class="cc"><h3>Data Completeness</h3><div class="ccsub">Fill rate per column</div><div class="plist">${ca.slice(0,14).map(c=>{var pct=Math.round(c.total/Math.max(commData.length,1)*100);var col=pct===100?'#22d3a5':pct>70?'#f59e0b':'#ef4444';return`<div class="pi"><div class="ph"><span>${esc(c.h)}</span><span style="color:${col}">${pct}%${c.missing?' ('+c.missing+' missing)':''}</span></div><div class="pt"><div class="pf" style="width:${pct}%;background:${col}"></div></div></div>`;}).join('')}</div></div>`;
  el.innerHTML=metrics+addrSection+chartRows+complete;
  bindDrillClicks(el);
  setTimeout(()=>{catCols.forEach((c,i)=>{if(c.unique.length<=8){var t=topN(c.freq,8);drawDoughnut('cc_'+i,t.map(x=>x[0]),t.map(x=>x[1]));} });if(addrAreas.length){var t=addrAreas.slice(0,8);drawDoughnut('addrChart',t.map(x=>x[0]),t.map(x=>x[1]));}},80);
}
function buildCatCard(c,sheet,idx){
  var isSmall=c.unique.length<=8,total=sheet==='express'?exprData.length:commData.length;
  var bars=topN(c.freq,8).map((kv,j)=>mkBarRow(sheet,c.h,kv[0],kv[1],total,j)).join('');
  return`<div class="cc clickable" data-drill-col="${esc(c.h)}" data-drill-sheet="${sheet}"><h3>${esc(c.h)}</h3><div class="ccsub">${c.total} values · ${c.unique.length} unique · <span style="color:var(--blue)">click ↗</span></div>${isSmall?`<div class="chwrap" style="height:200px"><canvas id="cc_${idx}"></canvas></div>`:`<div class="sbl-list">${bars}</div>`}</div>`;
}

  var rows='';for(var i=0;i<manualCols.length;i+=2){rows+=`<div class="g2" style="margin-bottom:14px">${buildCatCard(manualCols[i],'express',i)}${manualCols[i+1]?buildCatCard(manualCols[i+1],'express',i+1):''}</div>`;}

function renderCrossA(){
  var el=document.getElementById('aContent');
  var ca=analyseColumns(commHeaders,commData),ea=analyseColumns(exprHeaders,exprData);
  el.innerHTML=`<div class="g2" style="margin-bottom:14px"><div class="cc"><h3>Sheet Comparison</h3><div class="ccsub">Side-by-side overview</div><div class="mstats"><div class="mstat"><span class="msl">Commercial Records</span><span class="msv" style="color:var(--blue)">${commData.length}</span></div><div class="mstat"><span class="msl">Express Records</span><span class="msv" style="color:var(--green)">${exprData.length}</span></div><div class="mstat"><span class="msl">Commercial Columns</span><span class="msv">${commHeaders.length}</span></div><div class="mstat"><span class="msl">Express Columns</span><span class="msv">${exprHeaders.length}</span></div></div></div><div class="cc"><h3>Volume Comparison</h3><div class="ccsub">Records per sheet</div><div class="chwrap" style="height:200px"><canvas id="xcc"></canvas></div></div></div><div class="cc" style="margin-bottom:14px"><h3>Commercial Columns (${commHeaders.length})</h3><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${ca.map(c=>{var pct=Math.round(c.total/Math.max(commData.length,1)*100);var cls=pct===100?'bg':pct>70?'ba':'br';return`<span class="badge ${cls}">${esc(c.h)}${pct<100?' '+pct+'%':''}</span>`;}).join('')}</div></div><div class="cc"><h3>Express Columns (${exprHeaders.length})</h3><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${ea.map(c=>{var isA=EXPR_AUTO.includes(c.h);return`<span class="badge ${isA?'bi':'bg'}">${esc(c.h)}${isA?' ★':''}</span>`;}).join('')}</div></div>`;
  setTimeout(()=>drawBar('xcc',['Commercial','Express'],[commData.length,exprData.length],'#4f7cff'),80);
}
function getAlerts(){
  var alerts=[],ca=analyseColumns(commHeaders,commData),ea=analyseColumns(exprHeaders,exprData);
  var statusH=commHeaders.find(h=>h.toLowerCase().includes('status'))||'';
  if(statusH){var p=commData.filter(r=>(r[statusH]||'').toLowerCase().includes('pend'));var hd=commData.filter(r=>{var s=(r[statusH]||'').toLowerCase();return s.includes('hold')||s.includes('delay');});if(p.length)alerts.push({type:'warn',title:`${p.length} commercial entries pending`,sub:'Review required'});if(hd.length)alerts.push({type:'danger',title:`${hd.length} entries on hold/delayed`,sub:'Immediate attention needed'});}
  ca.filter(c=>c.missing>0&&c.missing/Math.max(commData.length,1)>0.1).forEach(c=>alerts.push({type:'warn',title:`${c.missing} missing in "${c.h}"`,sub:`${Math.round(c.missing/commData.length*100)}% empty`}));
  if(exprHeaders[0]){var nk=exprData.filter(r=>!(r[exprHeaders[0]]||'').trim());if(nk.length)alerts.push({type:'danger',title:`${nk.length} Express rows missing ${exprHeaders[0]}`,sub:'Key identifier empty'});}
  if(!alerts.length)alerts.push({type:'ok',title:'All clear',sub:'No issues detected'});
  return alerts;
}
function renderAlerts(){
  var alerts=getAlerts(),ca=analyseColumns(commHeaders,commData);
  document.getElementById('mainContent').innerHTML=`<div class="g2"><div class="cc"><h3>🔔 Active Alerts (${alerts.filter(a=>a.type!=='ok').length})</h3><div class="ccsub">Auto-generated</div><div class="alist">${alerts.map(a=>`<div class="ai ${a.type}"><div class="att">${a.type==='danger'?'🔴':a.type==='warn'?'🟡':'✅'} ${a.title}</div><div class="ats">${a.sub}</div></div>`).join('')}</div></div><div class="cc"><h3>📊 Column Health</h3><div class="ccsub">Commercial fill rate</div><div class="plist">${ca.map(c=>{var pct=Math.round(c.total/Math.max(commData.length,1)*100);var col=pct===100?'#22d3a5':pct>70?'#f59e0b':'#ef4444';return`<div class="pi"><div class="ph"><span>${esc(c.h)}</span><span style="color:${col}">${pct}%</span></div><div class="pt"><div class="pf" style="width:${pct}%;background:${col}"></div></div></div>`;}).join('')}</div></div></div>`;
}

// DRILL DOWN
function bindDrillClicks(container){
  container.querySelectorAll('[data-drill-col]').forEach(el=>el.addEventListener('click',function(e){if(e.target.closest('[data-drill-val]')&&e.target.closest('[data-drill-val]')!==this)return;drillColumn(this.dataset.drillSheet,this.dataset.drillCol);}));
  container.querySelectorAll('[data-drill-val]').forEach(el=>el.addEventListener('click',function(e){e.stopPropagation();var p=this.dataset.drillVal.split('|||');drillColumnValue(this.dataset.drillSheet,p[0].trim(),p[1]);}));
  container.querySelectorAll('[data-drill-num]').forEach(el=>el.addEventListener('click',function(e){e.stopPropagation();drillNumeric(this.dataset.drillSheet,this.dataset.drillNum);}));
}
function openDrill(title,subtitle,bodyHtml){drillStack.push({title,subtitle,bodyHtml});renderDrill();}
function renderDrill(){
  var cur=drillStack[drillStack.length-1];
  document.getElementById('dtitle').textContent=cur.title;
  document.getElementById('dsubtitle').textContent=cur.subtitle||'';
  document.getElementById('backBtn').style.display=drillStack.length>1?'':'none';
  var body=document.getElementById('dbody');body.innerHTML=cur.bodyHtml;
  document.getElementById('doverlay').classList.add('open');
  bindDrillClicks(body);
  setTimeout(()=>{body.querySelectorAll('[data-chart]').forEach(el=>{var d=JSON.parse(el.dataset.chart);if(d.type==='doughnut')drawDoughnut(el.id,d.labels,d.vals);else drawBar(el.id,d.labels,d.vals,d.color);});},60);
}
function drillBack(){drillStack.pop();if(drillStack.length)renderDrill();else closeDrill();}
function closeDrill(){document.getElementById('doverlay').classList.remove('open');drillStack=[];}

function drillColumn(sheet,colName){
  var isE=sheet==='express',data=isE?exprData:commData,headers=isE?exprHeaders:commHeaders;
  var col=analyseColumns(headers,data).find(c=>c.h===colName);if(!col)return;
  var top=topN(col.freq,20),total=data.length;
  var isAddr=colName.toLowerCase().includes('delivery')||colName.toLowerCase().includes('address');
  var addrZoneHtml='';
  if(isAddr){var zoneMap={};data.forEach(r=>{var z=extractArea(r[colName]||'');if(z)zoneMap[z]=(zoneMap[z]||0)+1;});var zones=Object.entries(zoneMap).sort((a,b)=>b[1]-a[1]);var cdata=JSON.stringify({type:'doughnut',labels:zones.slice(0,8).map(x=>x[0]),vals:zones.slice(0,8).map(x=>x[1])});var zbars=zones.map((kv,i)=>{var v=kv[0],c=kv[1],p=Math.round(c/total*100);return`<div class="sbl-row" data-drill-val="${esc(colName)}|||${esc(v)}" data-drill-sheet="${sheet}"><div class="sbl-label">${esc(v)}</div><div class="sbl-track"><div class="sbl-fill" style="width:${Math.max(p,2)}%;background:${PAL[i]}"></div></div><div class="sbl-count">${c}</div><div class="sbl-pct">${p}%</div></div>`;}).join('');addrZoneHtml=`<div class="g2" style="margin-bottom:12px"><div class="cc"><h3>📍 Zones (click to filter)</h3><div class="sbl-list">${zbars}</div></div><div class="cc"><h3>📍 Zone Distribution</h3><div class="chwrap" style="height:190px"><canvas id="zc1" data-chart='${cdata}'></canvas></div></div></div>`;}
  var cdata2=JSON.stringify({type:'doughnut',labels:top.slice(0,8).map(x=>x[0]),vals:top.slice(0,8).map(x=>x[1])});
  var bars=top.map((kv,i)=>{var v=kv[0],c=kv[1],p=Math.round(c/total*100);return`<div class="sbl-row" data-drill-val="${esc(colName)}|||${esc(v)}" data-drill-sheet="${sheet}"><div class="sbl-label" title="${esc(v)}">${esc(v||'(blank)')}</div><div class="sbl-track"><div class="sbl-fill" style="width:${Math.max(p,2)}%;background:${PAL[i%PAL.length]}"></div></div><div class="sbl-count">${c}</div><div class="sbl-pct">${p}%</div></div>`;}).join('');
  openDrill(colName,`${col.total} values · ${col.unique.length} unique`,addrZoneHtml+`<div class="g2"><div class="cc"><h3>Distribution</h3><div class="chwrap" style="height:190px"><canvas id="dc1" data-chart='${cdata2}'></canvas></div></div><div class="cc"><h3>All Values — click to filter</h3><div class="sbl-list">${bars}</div></div></div>`);
}

function drillColumnValue(sheet,colName,value){
  var isE=sheet==='express',data=isE?exprData:commData,headers=isE?exprHeaders:commHeaders;
  var isAddr=colName.toLowerCase().includes('delivery')||colName.toLowerCase().includes('address');
  var filtered=data.filter(r=>{var v=(r[colName]||'').trim();if(isAddr){var z=extractArea(v);return z===value||v===value;}return v===value.trim();});
  var fa=analyseColumns(headers,filtered),numCols=fa.filter(c=>c.isNumeric&&c.sum!=null);
  var otherCats=fa.filter(c=>c.isCat&&!c.isDate&&!c.isId&&c.h!==colName&&c.unique.length>=2&&c.unique.length<=15&&c.total>0).slice(0,4);
  var showCols=headers.filter(h=>!EXPR_AUTO.includes(h)).slice(0,10);
  var stats=`<div class="dstats"><div class="dsc"><div class="dl">Records</div><div class="dv">${filtered.length}</div><div class="ds">matching</div></div><div class="dsc"><div class="dl">% of Total</div><div class="dv">${Math.round(filtered.length/Math.max(data.length,1)*100)}%</div><div class="ds">of ${data.length}</div></div>${numCols.map(c=>`<div class="dsc"><div class="dl">${esc(c.h)}</div><div class="dv">${Math.round(c.sum).toLocaleString()}</div><div class="ds">Avg: ${c.avg.toFixed(1)}</div></div>`).join('')}</div>`;
  var subs='';if(otherCats.length){var pairs='';for(var i=0;i<otherCats.length;i+=2){var c1=otherCats[i],c2=otherCats[i+1];var b1=topN(c1.freq,5).map((kv,j)=>mkBarRow(sheet,c1.h,kv[0],kv[1],filtered.length,j)).join('');var b2=c2?topN(c2.freq,5).map((kv,j)=>mkBarRow(sheet,c2.h,kv[0],kv[1],filtered.length,j)).join(''):'';pairs+=`<div class="g2" style="margin-bottom:10px"><div class="cc"><h3>${esc(c1.h)}</h3><div class="sbl-list">${b1}</div></div>${c2?`<div class="cc"><h3>${esc(c2.h)}</h3><div class="sbl-list">${b2}</div></div>`:''}</div>`;}subs=pairs;}
  var tbl=`<div class="cc"><h3>${filtered.length} Matching Records</h3><div class="dtscroll"><table class="dtable"><thead><tr><th>#</th>${showCols.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${filtered.map((r,i)=>`<tr><td style="color:var(--text3)">${i+1}</td>${showCols.map(h=>`<td title="${esc(r[h]||'')}">${esc(r[h]||'')||'—'}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;
  openDrill(`${colName}: "${value}"`,`${filtered.length} matching records`,stats+subs+tbl);
}

function drillNumeric(sheet,colName){
  var isE=sheet==='express',data=isE?exprData:commData,headers=isE?exprHeaders:commHeaders;
  var col=analyseColumns(headers,data).find(c=>c.h===colName);if(!col||!col.isNumeric)return;
  var mn=col.min,mx=col.max,range=mx-mn||1,buckets=6,bSize=range/buckets;
  var bLabels=Array.from({length:buckets},(_,i)=>`${Math.round(mn+i*bSize)}–${Math.round(mn+(i+1)*bSize)}`);
  var bVals=Array(buckets).fill(0);col.numVals.forEach(v=>{var b=Math.min(Math.floor((v-mn)/bSize),buckets-1);bVals[b]++;});
  var cdata=JSON.stringify({type:'bar',labels:bLabels,vals:bVals,color:'#22d3a5'});
  openDrill(`${colName} — Analysis`,`${col.numVals.length} values`,`<div class="dstats"><div class="dsc"><div class="dl">Total</div><div class="dv">${Math.round(col.sum).toLocaleString()}</div></div><div class="dsc"><div class="dl">Average</div><div class="dv">${col.avg.toFixed(1)}</div></div><div class="dsc"><div class="dl">Max</div><div class="dv">${col.max.toFixed(0)}</div></div><div class="dsc"><div class="dl">Min</div><div class="dv">${col.min.toFixed(0)}</div></div><div class="dsc"><div class="dl">Count</div><div class="dv">${col.numVals.length}</div></div><div class="dsc"><div class="dl">Missing</div><div class="dv">${col.missing}</div></div></div><div class="cc"><h3>Distribution</h3><div class="chwrap" style="height:200px"><canvas id="ndc" data-chart='${cdata}'></canvas></div></div>`);
}

// MODAL
function openModal(sheet,rowIdx){
  modalState={sheet,rowIdx};
  var isE=sheet==='express',headers=isE?exprHeaders:commHeaders,data=rowIdx>=0?(isE?exprData[rowIdx]:commData[rowIdx]):{};
  document.getElementById('mtitle').textContent=(rowIdx<0?'Add New ':'Edit ')+(isE?'Express Shipment':'Commercial Entry');
  if(!headers.length){document.getElementById('formContent').innerHTML='<p style="color:var(--text3)">No headers found.</p>';document.getElementById('overlay').classList.add('open');return;}
  document.getElementById('formContent').innerHTML=`<div class="fgrid">${headers.map((h,i)=>{var isA=isE&&EXPR_AUTO.includes(h),val=data[h]||'';return`<div class="ff"><label>${esc(h)}${isA?'<span class="autotag">auto</span>':''}</label><input type="text" id="ff_${i}" value="${esc(val)}" ${isA?'readonly placeholder="Auto-computed by formula"':'placeholder="'+esc(h)+'"'}></div>`;}).join('')}</div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
async function saveEntry(){
  var{sheet,rowIdx}=modalState,isE=sheet==='express',headers=isE?exprHeaders:commHeaders;
  var newRow={},arr=headers.map((h,i)=>{var v=document.getElementById('ff_'+i)?.value||'';newRow[h]=v;return v;});
  var btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='Saving...';
  try{
    await writeSheet(rowIdx<0?'append':'update',isE?'express':'commercial',arr,rowIdx<0?null:rowIdx+2);
    if(rowIdx<0){if(isE)exprData.push(newRow);else commData.push(newRow);}else{if(isE)exprData[rowIdx]=newRow;else commData[rowIdx]=newRow;}
    closeModal();updateBadges();renderPage();toast((rowIdx<0?'Entry added':'Updated')+' · synced to Google Sheet','ok');
  }catch(e){toast('Save failed: '+e.message,'err');}
  btn.disabled=false;btn.textContent='Save';
}
async function delRow(sheet,idx){
  if(!confirm('Delete this row? Will also remove from Google Sheet.'))return;
  try{
    await writeSheet('delete',sheet==='express'?'express':'commercial',[],idx+2);
    if(sheet==='express')exprData.splice(idx,1);else commData.splice(idx,1);
    updateBadges();renderPage();toast('Deleted','ok');
  }catch(e){toast('Delete failed: '+e.message,'err');}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(msg,type){var w=document.getElementById('twrap'),el=document.createElement('div');el.className='toast'+(type==='ok'?' ok':type==='err'?' err':type==='info'?' info':'');el.textContent=msg;w.appendChild(el);requestAnimationFrame(()=>el.classList.add('show'));setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400);},3500);}
</script>
